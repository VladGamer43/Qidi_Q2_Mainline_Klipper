# Qidi Q2 mainline Klipper required config changes
#
# This file is intentionally NOT a full printer profile.
# Copy/merge these sections into your Q2 stock config and adjust values for your machine.

##### MCU paths #####
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_BE2F32373534350E35353635-if00
restart_method: command

[mcu THR]
serial: /dev/ttyS4
restart_method: command
baud: 500000

##### Z axis (mainline homing path) #####
[stepper_z]
step_pin:PC10
dir_pin:PA15
enable_pin:!PC11
microsteps: 128
rotation_distance: 4
full_steps_per_rotation: 200
endstop_pin: PC3
position_endstop: -2
position_max: 265
position_min: -2
homing_speed: 10
second_homing_speed: 5
homing_retract_dist: 10.0
homing_positive_dir: false

[stepper_z1]
step_pin:PB1
dir_pin:PB6
enable_pin:!PB0
microsteps: 128
rotation_distance: 4
full_steps_per_rotation: 200

##### Stepper driver thermal tuning #####
[tmc2240 stepper_x]
spi_software_sclk_pin:PA5
spi_software_miso_pin:PA6
spi_software_mosi_pin:PA7
spi_speed:200000
cs_pin:PC12
diag0_pin:!PB8
interpolate:true
run_current: 1.07
stealthchop_threshold:0
driver_SGT:1
driver_SLOPE_CONTROL:2

[tmc2240 stepper_y]
spi_software_sclk_pin:PA5
spi_software_miso_pin:PA6
spi_software_mosi_pin:PA7
spi_speed:200000
cs_pin:PD2
diag0_pin:!PC0
interpolate:true
run_current: 1.07
stealthchop_threshold:0
driver_SGT:1
driver_SLOPE_CONTROL:2

##### Extruder thermocouple on software SPI #####
[extruder]
step_pin:THR:PB9
dir_pin:!THR:PB8
enable_pin:!THR:PC15
rotation_distance: 53.7
gear_ratio: 1517:170
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
min_temp: 0
max_temp: 375
min_extrude_temp: 170
smooth_time: 0.000001
heater_pin:THR:PB15
sensor_type:MAX6675
sensor_pin:THR:PB12
spi_speed: 100000
spi_software_sclk_pin:THR:PB13
spi_software_miso_pin:THR:PB14
spi_software_mosi_pin:THR:PA15
# spi_bus: spi2
max_power: 1
pressure_advance: 0.032
pressure_advance_smooth_time: 0.03
max_extrude_cross_section:500
instantaneous_corner_velocity: 10.000
max_extrude_only_distance: 1000.0
max_extrude_only_velocity:5000
max_extrude_only_accel:5000

##### Chamber heater (mainline compatibility) #####
[heater_generic chamber]
heater_pin:PC8
max_power:1.0
sensor_type:NTC 100K MGB18-104F39050L32
sensor_pin:PA1
control = pid
pid_Kp=63.418
pid_Ki=1.342
pid_Kd=749.125
min_temp:-100
max_temp:70
# z_max_limit:230

##### Load cell probe (replaces stock probe_air block) #####
[load_cell_probe]
sensor_type: cs1237
sclk_pin: THR:PB3
dout_pin: THR:PB4
sample_rate: 1280
gain: 128
z_offset: 0
speed: 5
lift_speed: 5
samples: 2
sample_retract_dist: 3
samples_result: average
samples_tolerance: 0.02
samples_tolerance_retries: 10
# Force threshold in grams that counts as a tap.
# 75g is conservative for a direct-drive setup; lower if probe misses taps.
trigger_force: 75
# Uncomment and fill in after running LOAD_CELL_CALIBRATE:
#counts_per_gram: ...
#reference_tare_counts: ...
